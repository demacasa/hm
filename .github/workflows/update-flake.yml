name: update-flake

# Daily `nix flake update`, committing the refreshed flake.lock back to main
# (mirrors the nixconfig update-flake job). The push triggers the `check`
# workflow, which validates the new lock.
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update flake inputs
        run: nix flake update
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- flake.lock; then
            echo "flake.lock unchanged; nothing to do."
            exit 0
          fi
          git config user.name "demacasa"
          git config user.email "demacasa@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: nix flake update"
          git push
